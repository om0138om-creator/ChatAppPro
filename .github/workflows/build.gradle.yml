name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4  # تم التحديث لـ v4

    - name: set up JDK 17
      uses: actions/setup-java@v4  # تم التحديث لـ v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4  # هذا هو السطر الذي تسبب في الخطأ، قمنا بتحديثه لـ v4
      with:
        name: chat-app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
